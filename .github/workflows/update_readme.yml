name: Update README

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Update Profile README
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Readme-Workflows/recent-activity@v2.4.1
        with:
          GIT_COMMIT: true       
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
